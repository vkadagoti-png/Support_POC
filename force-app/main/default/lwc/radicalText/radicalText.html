<template>

    <!-- fieldName: {fieldName} <br /> -->

    <template lwc:if={disabled}>
        <div style="text-wrap: wrap;"> 
            <lightning-formatted-rich-text
                value={recordValue}
            ></lightning-formatted-rich-text>
        </div>
    </template>
    <template lwc:else>
        <lightning-input 
            name="text" 
            type="text" 
            variant='label-hidden'
            value={recordValue} 
            onchange={handleChange}
        ></lightning-input>
    </template>
</template>
