<template>
    <template if:true={showButton}>
        <lightning-button variant="brand" label="Add Comment" title="Add Comment"
            onclick={handlebutton}></lightning-button>
    </template>

    <template if:true={showModal}>
        <div class="custom-modal">
            <section role="dialog" class="slds-modal slds-fade-in-open">

                <div class="slds-modal__container modal-container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium slds-hyphenate">Add Comment</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium modalBody">
                        <template if:true={showSpinner}>
                            <lightning-spinner alternative-text="Loading" size="medium" class="spinnerClass"
                                variant="base"></lightning-spinner>
                        </template>
                        <template if:false={showSpinner}> </template>
                        <div class="slds-p-around_small">
                            <lightning-textarea max-length="1000" name="comment" label="Comment"
                                placeholder="add comment here..." value={commentString} onchange={handlecommentchange}
                                variant="standard"></lightning-textarea>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" title="Cancel" onclick={handleCloseModal}
                            class="slds-m-right_small"></lightning-button>
                        <lightning-button variant="brand" label="Save" onclick={handleSubmitComment}
                            title="Save"></lightning-button>
                    </footer>
                </div>

            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </div>
    </template>
</template>
