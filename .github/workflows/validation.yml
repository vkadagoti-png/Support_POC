name: 1 - PR Validation (QA)

on:
  pull_request:
    branches: [ develop ]
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'
  push:
    branches: [ develop ]
    paths:
      - 'force-app/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      - name: Authenticate using Legacy SFDX (Most Stable)
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          echo "🔐 Authenticating (Legacy method)..."
          echo "$SF_AUTH_URL" > auth.txt
          sfdx auth:sfdxurl:store -f auth.txt -a qa-sandbox -s
          rm auth.txt
          sf org display --target-org qa-sandbox

      - name: Basic PMD Code Scan
        uses: pmd/pmd-github-action@v2
        with:
          rulesets: 'category/apex/security.xml,category/apex/bestpractices.xml'
          source-path: 'force-app/main/default/classes'

      - name: Run Apex Tests & Coverage
        env:
          SF_ALIAS: qa-sandbox
        run: |
          mkdir -p test-results
          sf apex run test \
            --target-org $SF_ALIAS \
            --test-level RunLocalTests \
            --code-coverage \
            --result-format json \
            --output-dir test-results \
            --wait 30

      - name: Check-Only Deployment Validation
        env:
          SF_ALIAS: qa-sandbox
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org $SF_ALIAS \
            --test-level RunLocalTests \
            --wait 45 \
            --json > validate-result.json

      - name: Show Validation Result
        run: cat validate-result.json | jq '.' || echo "Validation completed"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: |
            validate-result.json
            test-results/