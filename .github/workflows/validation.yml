name: 1 - PR Validation (QA)

on:
  pull_request:
    branches: [ develop ]
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      - name: Authenticate using JWT (Stable)
        env:
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SF_PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}
        run: |
          echo "$SF_PRIVATE_KEY" > server.key
          sf org login jwt \
            --client-id $SF_CLIENT_ID \
            --jwt-keyfile server.key \
            --username $SF_USERNAME \
            --instance-url $SF_INSTANCE_URL \
            --alias qa-sandbox \
            --set-default
          rm server.key
          sf org display --target-org qa-sandbox

      - name: Basic PMD Code Scan
        uses: pmd/pmd-github-action@v2
        with:
          rulesets: 'category/apex/security.xml,category/apex/bestpractices.xml'
          source-path: 'force-app/main/default/classes'

      - name: Run Apex Tests & Coverage
        run: |
          mkdir -p test-results
          sf apex run test \
            --target-org qa-sandbox \
            --test-level RunLocalTests \
            --code-coverage \
            --result-format json \
            --output-dir test-results \
            --wait 30

      - name: Check-Only Deployment Validation
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org qa-sandbox \
            --test-level RunLocalTests \
            --wait 45 \
            --json > validate-result.json

      - name: Show Validation Result
        run: cat validate-result.json | jq '.' || echo "Validation completed"