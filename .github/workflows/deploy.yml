name: 2 - Deploy to QA Sandbox

on:
  push:
    branches: [ main ]
    paths:
      - 'force-app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      - name: Download Validation Artifacts (Optional)
        uses: actions/download-artifact@v4
        with:
          name: validation-artifacts
          path: .

      - name: Authenticate to Salesforce Sandbox
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias ${{ secrets.SF_TARGET_ORG_ALIAS }} --set-default
          rm auth.txt
          sf org display --target-org ${{ secrets.SF_TARGET_ORG_ALIAS }}

      - name: Deploy to QA Sandbox
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org ${{ secrets.SF_TARGET_ORG_ALIAS }} \
            --test-level RunLocalTests \
            --wait 60 \
            --json > deploy-result.json

      - name: Show Deployment Result
        run: cat deploy-result.json | jq '.'